{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "checkmate.fullname" . }}-mongodb
  namespace: {{ include "checkmate.namespace" . }}
  labels:
    {{- include "checkmate.componentLabels" (dict "root" . "component" "mongodb") | nindent 4 }}
  {{- with .Values.global.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "checkmate.componentSelectorLabels" (dict "root" . "component" "mongodb") | nindent 4 }}
  ports:
    - name: mongodb
      port: {{ .Values.mongodb.port }}
      targetPort: mongodb
      protocol: TCP
{{- end }}