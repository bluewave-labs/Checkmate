{{- if .Values.server.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "checkmate.fullname" . }}-server
  namespace: {{ include "checkmate.namespace" . }}
  labels:
    {{- include "checkmate.componentLabels" (dict "root" . "component" "server") | nindent 4 }}
  {{- $ann := merge (default dict .Values.server.ingress.annotations) (default dict .Values.global.annotations) }}
  {{- if $ann }}
  annotations:
    {{- toYaml $ann | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.server.ingress.className }}
  {{- if .Values.server.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.server.ingress.host }}
      secretName: {{ include "checkmate.serverIngressTLSSecretName" . }}
  {{- end }}
  rules:
    - host: {{ .Values.server.ingress.host }}
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "checkmate.fullname" . }}-server
                port:
                  number: {{ .Values.server.port }}
{{- end }}
