apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "checkmate.fullname" . }}-client
  namespace: {{ include "checkmate.namespace" . }}
  labels:
    {{- include "checkmate.componentLabels" (dict "root" . "component" "client") | nindent 4 }}
  {{- with .Values.global.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.client.replicas }}
  selector:
    matchLabels:
      {{- include "checkmate.componentSelectorLabels" (dict "root" . "component" "client") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "checkmate.componentSelectorLabels" (dict "root" . "component" "client") | nindent 8 }}
        {{- with .Values.client.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.client.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.affinity }}
      affinity:
        {{- include "checkmate.tplrender" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.client.tolerations }}
      tolerations:
        {{- include "checkmate.tplrender" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      containers:
        - name: client
          image: {{ .Values.client.image }}
          imagePullPolicy: {{ .Values.client.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.client.port }}
              protocol: TCP
          env:
            # Runtime variables consumed by the nginx entrypoint script in the container image.
            - name: UPTIME_APP_API_BASE_URL
              value: {{ include "checkmate.serverAPIBaseURL" . | quote }}
            - name: UPTIME_APP_CLIENT_HOST
              value: {{ include "checkmate.clientHost" . | quote }}
            {{- with .Values.client.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          {{- with .Values.client.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.client.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "checkmate.fullname" . }}-nginx-cm
