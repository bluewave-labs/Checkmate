{{- if .Values.client.httproute.enabled }}
{{- if not (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") }}
  {{- fail "Gateway API CRDs (gateway.networking.k8s.io/v1) not found in the cluster. Install them before enabling client.httproute." }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "checkmate.fullname" . }}-client
  namespace: {{ include "checkmate.namespace" . }}
  labels:
    {{- include "checkmate.componentLabels" (dict "root" . "component" "client") | nindent 4 }}
  {{- $ann := merge (default dict .Values.client.httproute.annotations) (default dict .Values.global.annotations) }}
  {{- if $ann }}
  annotations:
    {{- toYaml $ann | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.client.httproute.gatewayName }}
      namespace: {{ default (include "checkmate.namespace" .) .Values.client.httproute.gatewayNamespace }}
  {{- if .Values.client.httproute.hostnames }}
  hostnames:
    {{- toYaml .Values.client.httproute.hostnames | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "checkmate.fullname" . }}-client
          port: {{ .Values.client.port }}
{{- end }}
