apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkmate-api
spec:
  replicas: 1 # single scheduler — seeds/reconciles the jobs collection
  selector:
    matchLabels:
      app: checkmate-api
  template:
    metadata:
      labels:
        app: checkmate-api
    spec:
    {{- with .Values.api.affinity }}
      affinity:
        {{- tpl ( . | toYaml) $ | nindent 8 }}
    {{- end }}
    {{- with .Values.api.tolerations }}
      tolerations:
        {{- tpl ( . | toYaml) $ | nindent 8 }}
    {{- end }}
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - secretRef:
                name: checkmate-secrets
          {{- with .Values.api.resources }}
          resources:
              {{- tpl ( . | toYaml) $ | nindent 12 }}
          {{- end }}
          env:
          - name: CLIENT_HOST
            value: "{{ .Values.client.protocol }}://{{ .Values.client.ingress.host }}"
          - name: QUEUE_MODE
            value: "primary"
          - name: QUEUE_PRIMARY_PROCESSES # false: API schedules only, worker tier processes jobs
            value: {{ .Values.api.queuePrimaryProcesses | quote }}
