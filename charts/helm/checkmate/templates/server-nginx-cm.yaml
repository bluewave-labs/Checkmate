apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "checkmate.fullname" . }}-nginx-cm
  namespace: {{ include "checkmate.namespace" . }}
  labels:
    {{- include "checkmate.componentLabels" (dict "root" . "component" "client") | nindent 4 }}
  {{- with .Values.global.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  default.conf: |
    server {
      listen       80;
      listen  [::]:80;

      # Catch-all: this container hosts a single site
      server_name  _;
      server_tokens off;

      # Required for cert-manager HTTP-01 ACME challenge
      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
      }

      location / {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
          # SPA fallback: unknown paths serve index.html so React Router can handle them
          try_files $uri $uri/ /index.html;
      }

      # Proxy Swagger UI to the backend ClusterIP Service
      location /api-docs/ {
          proxy_pass         http://{{ include "checkmate.fullname" . }}-server:{{ .Values.server.port }}/api-docs/;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
      }
    }