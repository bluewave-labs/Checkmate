{{- /*
  prechecks.yaml — pre-flight validation run at helm install / helm upgrade.
  Produces no Kubernetes resources; only fail() calls that abort the render early.
*/ -}}

{{- /* ── Secret validation ─────────────────────────────────────────────────── */}}
{{- if not .Values.secrets.existingSecret }}
  {{- if or (empty .Values.secrets.JWT_SECRET) (eq .Values.secrets.JWT_SECRET "change_me") }}
    {{- fail "secrets.JWT_SECRET must be set to a non-default value before deploying" }}
  {{- end }}
{{- end }}

{{- /* ── Exactly one routing mode per component ───────────────────────────── */}}
{{- if and .Values.client.ingress.enabled .Values.client.httproute.enabled }}
  {{- fail "client: ingress.enabled and httproute.enabled cannot both be true — choose one" }}
{{- end }}
{{- if and .Values.server.ingress.enabled .Values.server.httproute.enabled }}
  {{- fail "server: ingress.enabled and httproute.enabled cannot both be true — choose one" }}
{{- end }}

{{- /* ── Client Ingress validations ─────────────────────────────────────────── */}}
{{- if .Values.client.ingress.enabled }}
  {{- if eq .Values.client.ingress.host "change_me" }}
    {{- fail "client.ingress.host must be set to a real hostname before deploying" }}
  {{- end }}
  {{- $proto := .Values.client.protocol }}
  {{- if not (or (eq $proto "http") (eq $proto "https")) }}
    {{- fail "client.protocol must be either 'http' or 'https'" }}
  {{- end }}
  {{- if and .Values.client.ingress.tls.enabled (ne $proto "https") }}
    {{- fail "client.ingress.tls.enabled requires client.protocol: https to prevent mixed-content issues" }}
  {{- end }}
  {{- $ann := .Values.client.ingress.annotations | default dict }}
  {{- if and .Values.client.ingress.tls.enabled (not (or (hasKey $ann "cert-manager.io/cluster-issuer") (hasKey $ann "cert-manager.io/issuer"))) }}
    {{- fail "client.ingress.tls.enabled requires a cert-manager annotation: cert-manager.io/cluster-issuer or cert-manager.io/issuer" }}
  {{- end }}
{{- end }}

{{- /* ── Client HTTPRoute validations ────────────────────────────────────────── */}}
{{- if .Values.client.httproute.enabled }}
  {{- if not .Values.client.httproute.gatewayName }}
    {{- fail "client.httproute.gatewayName is required when client.httproute.enabled is true" }}
  {{- end }}
{{- end }}

{{- /* ── Server Ingress validations ─────────────────────────────────────────── */}}
{{- if .Values.server.ingress.enabled }}
  {{- if eq .Values.server.ingress.host "change_me" }}
    {{- fail "server.ingress.host must be set to a real hostname before deploying" }}
  {{- end }}
  {{- $proto := .Values.server.protocol }}
  {{- if not (or (eq $proto "http") (eq $proto "https")) }}
    {{- fail "server.protocol must be either 'http' or 'https'" }}
  {{- end }}
  {{- if and .Values.server.ingress.tls.enabled (ne $proto "https") }}
    {{- fail "server.ingress.tls.enabled requires server.protocol: https" }}
  {{- end }}
  {{- $ann := .Values.server.ingress.annotations | default dict }}
  {{- if and .Values.server.ingress.tls.enabled (not (or (hasKey $ann "cert-manager.io/cluster-issuer") (hasKey $ann "cert-manager.io/issuer"))) }}
    {{- fail "server.ingress.tls.enabled requires a cert-manager annotation: cert-manager.io/cluster-issuer or cert-manager.io/issuer" }}
  {{- end }}
{{- end }}

{{- /* ── Server HTTPRoute validations ────────────────────────────────────────── */}}
{{- if .Values.server.httproute.enabled }}
  {{- if not .Values.server.httproute.gatewayName }}
    {{- fail "server.httproute.gatewayName is required when server.httproute.enabled is true" }}
  {{- end }}
{{- end }}

{{- /* ── Cross-component protocol consistency ────────────────────────────────── */}}
{{- if and (eq .Values.client.protocol "https") (eq .Values.server.protocol "http") }}
  {{- fail "client.protocol is 'https' but server.protocol is 'http' — browsers will block mixed-content requests. Set server.protocol: https." }}
{{- end }}

{{- /* ── External MongoDB requires an explicit connection string ───────────────── */}}
{{- if and (not .Values.mongodb.enabled) (not .Values.secrets.existingSecret) (empty .Values.secrets.DB_CONNECTION_STRING) }}
  {{- fail "mongodb.enabled is false — set secrets.DB_CONNECTION_STRING or use secrets.existingSecret" }}
{{- end }}
