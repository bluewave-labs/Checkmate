{{- /*
  secrets.yaml — creates the Kubernetes Secret consumed by the server via envFrom.
  Skipped entirely when secrets.existingSecret is set (Mode A).
  In Mode B (inline), smart defaults are applied:
    • DB_CONNECTION_STRING — auto-derived when mongodb.enabled is true.
    • CLIENT_HOST          — auto-derived from the active Ingress/HTTPRoute host.
    • REDIS_HOST/PORT      — auto-injected when redis.enabled is true.
  Any extra keys added under secrets.* are passed through verbatim.
*/ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "checkmate.fullname" . }}-secrets
  namespace: {{ include "checkmate.namespace" . }}
  labels:
    {{- include "checkmate.labels" . | nindent 4 }}
  {{- with .Values.global.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- /* ── Required keys (with auto-derivation) ──────────────────────────── */}}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  DB_CONNECTION_STRING: {{ include "checkmate.mongodbConnectionString" . | quote }}
  CLIENT_HOST: {{ include "checkmate.clientHost" . | quote }}
  {{- /* ── Auto-inject Redis connection when deployed in-cluster ─────────── */}}
  {{- if .Values.redis.enabled }}
  REDIS_HOST: {{ printf "%s-redis" (include "checkmate.fullname" .) | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- end }}
  {{- /* ── Pass through any remaining optional secrets verbatim ──────────── */}}
  {{- /* Keys handled above (plus the meta key) are excluded from iteration.  */}}
  {{- $managed := list "existingSecret" "JWT_SECRET" "DB_CONNECTION_STRING" "CLIENT_HOST" "REDIS_HOST" "REDIS_PORT" }}
  {{- range $key, $val := .Values.secrets }}
  {{- if and (not (has $key $managed)) (kindIs "string" $val) (ne $val "") }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}