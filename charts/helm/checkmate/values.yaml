client:
  enabled: true
  global:
    nameOverride: client
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/bluewave-labs/checkmate-client
            tag: v3.2.0
          env:
            UPTIME_APP_API_BASE_URL: "http://change_me/api/v1"
            UPTIME_APP_CLIENT_HOST: "http://change_me"
  service:
    main:
      controller: main
      ports:
        http:
          port: 80
  ingress:
    main:
      enabled: true
      className: nginx
      annotations: {}
      hosts:
        - host: change_me
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls: []
  configMaps:
    nginx:
      enabled: true
      data:
        default.conf: |
          server {
            listen       80;
            listen  [::]:80;

            server_name _;
            server_tokens off;

            location /.well-known/acme-challenge/ {
              root /var/www/certbot;
            }

            location / {
              root   /usr/share/nginx/html;
              index  index.html index.htm;
              try_files $uri $uri/ /index.html;
            }

            location /api-docs/ {
              proxy_pass http://{{ .Release.Name }}-server:52345/api-docs/;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
            }
          }
  persistence:
    nginx-config:
      enabled: true
      type: configMap
      identifier: nginx
      globalMounts:
        - path: /etc/nginx/conf.d/default.conf
          subPath: default.conf
  resources: {}
  affinity: {}
  tolerations: []

server:
  enabled: true
  global:
    nameOverride: server
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/bluewave-labs/checkmate-backend
            tag: v3.2.0
          env:
            CLIENT_HOST: "http://change_me"
          envFrom:
            - secretRef:
                name: checkmate-secrets
  service:
    main:
      controller: main
      ports:
        http:
          port: 52345
  ingress:
    main:
      enabled: true
      className: nginx
      annotations: {}
      hosts:
        - host: change_me
          paths:
            - path: /api/v1
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls: []
  resources: {}
  affinity: {}
  tolerations: []

mongodb:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: ""

secrets:
  JWT_SECRET: change_me
#  REFRESH_TOKEN_SECRET: change_me
#  SYSTEM_EMAIL_ADDRESS: test@example.com
#  SYSTEM_EMAIL_PASSWORD: change_me
#  SYSTEM_EMAIL_HOST: smtp.example.com
#  SYSTEM_EMAIL_PORT: "587"
#  PAGESPEED_API_KEY: change_me
  DB_CONNECTION_STRING: "mongodb://{{ .Release.Name }}-mongodb:27017/uptime_db"
  CLIENT_HOST: "{{ .Values.server.controllers.main.containers.main.env.CLIENT_HOST }}"
