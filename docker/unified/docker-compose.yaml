services:
  gateway:
    image: nginx:1.27.1-alpine
    container_name: checkmate-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  client-prod:
    image: ghcr.io/bluewave-labs/checkmate:frontend-demo
    restart: always
    environment:
      UPTIME_APP_API_BASE_URL: "https://demo.checkmate.so/api/v1"
      UPTIME_APP_CLIENT_HOST: "https://demo.checkmate.so"
    expose:
      - "80"
    depends_on:
      - server-prod
    volumes:
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
  server-prod:
    image: ghcr.io/bluewave-labs/checkmate:backend-demo
    restart: always
    ports:
      - "52345:52345"
    env_file:
      - server-prod.env
    depends_on:
      - mongodb-prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
  mongodb-prod:
    image: ghcr.io/bluewave-labs/checkmate:mongo-demo
    restart: always
    command: [ "mongod", "--quiet", "--bind_ip_all" ]
    volumes:
      - ./mongo/data-prod:/data/db
    env_file:
      - mongo-prod.env
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet" ]
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
