proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# --- PRODUCTION: demo.checkmate.so ---
server {
    listen 80;
    server_name demo.checkmate.so;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name demo.checkmate.so;

    ssl_certificate     /etc/nginx/ssl/live/demo.checkmate.so/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/demo.checkmate.so/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # Passes traffic to the prod client on port 80
        proxy_pass http://client-prod:80;
    }
}

# --- STAGING: staging.checkmate.so ---
server {
    listen 80;
    server_name staging.checkmate.so;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name staging.checkmate.so;

    ssl_certificate     /etc/nginx/ssl/live/staging.checkmate.so/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/staging.checkmate.so/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # Passes traffic to the staging client on port 80
        proxy_pass http://client-stage:80;
    }
}