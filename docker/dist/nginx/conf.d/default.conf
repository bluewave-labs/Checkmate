server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    server_tokens off;

    # Use Docker's embedded DNS so nginx re-resolves container IPs after
    # restarts instead of caching a stale address for the lifetime of the
    # worker process.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Variable assignment forces nginx to honour the resolver above
        # rather than resolving once at startup.
        set $upstream_server server;
        proxy_pass         http://$upstream_server:52345;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }

    location /api-docs/ {
        set $upstream_server server;
        proxy_pass         http://$upstream_server:52345;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}