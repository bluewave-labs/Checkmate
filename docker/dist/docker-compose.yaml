services:
  client:
    image: ghcr.io/bluewave-labs/checkmate-client:latest
    restart: always
    environment:
      # Relative path — works on any hostname without reconfiguration.
      # Nginx inside the client container proxies /api/ to the server.
      UPTIME_APP_API_BASE_URL: "/api/v1"
      UPTIME_APP_CLIENT_HOST: ""
    ports:
      - "80:80"
    depends_on:
      - server
  server:
    image: ghcr.io/bluewave-labs/checkmate-backend:latest
    restart: always
    expose:
      - "52345"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - DB_CONNECTION_STRING=mongodb://mongodb:27017/uptime_db
      - CLIENT_HOST=http://localhost
      - JWT_SECRET=my_secret
      - SCRIPT_ENCRYPTION_KEY=replace_with_64_hex_chars
    # volumes:
    # - /var/run/docker.sock:/var/run/docker.sock:ro
  mongodb:
    image: ghcr.io/bluewave-labs/checkmate-mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--quiet", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

volumes:
  mongo_data:
