server {
    listen 443 default_server ssl;
    listen [::]:443 default_server ssl;

    server_name checkmate-ng.checkmate.so www.checkate-ng.checkmate.so;
    server_tokens off;
    
    ssl_certificate /etc/letsencrypt/live/checkmate-ng.checkmate.so/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkmate-ng.checkmate.so/privkey.pem;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    
     location /api/ {
         proxy_pass http://checkmate-server:52345/api/;
         proxy_http_version 1.1;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
         proxy_set_header Connection '';
         chunked_transfer_encoding off;
         proxy_buffering off;
         proxy_cache off;
     }
}
