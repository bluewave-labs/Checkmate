name: Test Check (Server)
on:
  pull_request:
  workflow_dispatch:

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Run server tests
        working-directory: server
        run: npm test
